<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌌 Celestial AI Dashboard</title>

    <style>
      /* ===== RESET ===== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        font-family: "Segoe UI", system-ui, -apple-system;
        overflow: hidden;
        background: #020617;
        color: #fff;
      }

      #root {
        position: relative;
        z-index: 5;
        min-height: 100vh;
      }

      /* ===== CANVAS STARFIELD ===== */
      #star-canvas {
        position: fixed;
        inset: 0;
        z-index: 0;
      }

      /* ===== NEBULA (DARK MODE DEFAULT) ===== */
      body.dark::before {
        content: "";
        position: fixed;
        inset: -30%;
        background:
          radial-gradient(circle at 25% 35%, rgba(124,58,237,0.18), transparent 60%),
          radial-gradient(circle at 75% 65%, rgba(14,165,233,0.15), transparent 65%);
        animation: nebulaMove 40s ease-in-out infinite alternate;
        z-index: 1;
      }

      /* ===== NEBULA (LIGHT MODE) ===== */
      body.light::before {
        content: "";
        position: fixed;
        inset: -30%;
        background:
          radial-gradient(circle at 30% 40%, rgba(99,102,241,0.25), transparent 60%),
          radial-gradient(circle at 70% 60%, rgba(56,189,248,0.25), transparent 65%);
        animation: nebulaMove 40s ease-in-out infinite alternate;
        z-index: 1;
      }

      @keyframes nebulaMove {
        from { transform: translate(0,0) scale(1); }
        to   { transform: translate(-40px,-30px) scale(1.1); }
      }

      /* ===== UI CONTROLS ===== */
      .ui-controls {
        position: fixed;
        bottom: 16px;
        right: 16px;
        display: flex;
        gap: 10px;
        z-index: 10;
      }

      .ui-btn {
        padding: 8px 12px;
        border-radius: 20px;
        border: none;
        background: rgba(255,255,255,0.08);
        color: #fff;
        cursor: pointer;
        font-size: 13px;
        backdrop-filter: blur(6px);
        transition: transform .2s, background .2s;
      }

      .ui-btn:hover {
        transform: translateY(-2px);
        background: rgba(255,255,255,0.15);
      }
    </style>
  </head>

  <body class="dark">

    <!-- 🌠 STAR CANVAS -->
    <canvas id="star-canvas"></canvas>

    <!-- ⚛️ REACT ROOT -->
    <div id="root"></div>

    <!-- ⚛️ REACT ENTRY -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- ===== STARFIELD SCRIPT ===== -->
    <script>
      const canvas = document.getElementById("star-canvas");
      const ctx = canvas.getContext("2d");

      let w, h;
      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }
      window.addEventListener("resize", resize);
      resize();

      const stars = Array.from({ length: 220 }, () => ({
        x: Math.random() * w,
        y: Math.random() * h,
        z: Math.random() * 1.5 + 0.5
      }));

      function drawStars() {
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = "#fff";

        for (const s of stars) {
          ctx.globalAlpha = s.z;
          ctx.fillRect(s.x, s.y, 2, 2);
          s.y -= s.z * 0.3;
          if (s.y < 0) {
            s.y = h;
            s.x = Math.random() * w;
          }
        }
        requestAnimationFrame(drawStars);
      }
      drawStars();
    </script>

    <!-- ===== THEME TOGGLE ===== -->
    <script>
      document.getElementById("themeToggle").onclick = () => {
        document.body.classList.toggle("light");
        document.body.classList.toggle("dark");
      };
    </script>

  </body>
</html>
